<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>差出人情報の変更 | ロボットレターWEB注文システム</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .breadcrumb { font-size: 13px; color: #888; margin-bottom: 16px; }
    .breadcrumb a { color: #3d6b3d; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb span { margin: 0 6px; }
    .form-wrap { background: #fff; border-radius: 6px; padding: 28px 32px; box-shadow: 0 1px 4px rgba(0,0,0,.08); max-width: 560px; }
    .form-row { margin-bottom: 18px; }
    .form-label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
    .required { color: #c0392b; margin-left: 4px; font-size: 11px; }
    .postal-row { display: flex; gap: 8px; align-items: flex-end; }
    .postal-row .form-input { max-width: 160px; }
    .btn-search { padding: 9px 14px; background: #fff; border: 1px solid #3d6b3d; color: #3d6b3d; border-radius: 4px; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .btn-search:hover { background: #edf5ed; }
    .form-actions { margin-top: 28px; }
    .btn-submit { width: 100%; padding: 13px; background: #3d6b3d; color: #fff; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
    .btn-submit:hover { background: #2d5a2d; }
    .back-link { display: block; text-align: center; margin-top: 14px; font-size: 13px; color: #3d6b3d; text-decoration: underline; cursor: pointer; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-logo">ロボットレターWEB注文システム</div>
    <div class="header-user">
      <div class="user-trigger" id="userTrigger">
        <div class="user-avatar"></div>
        <span class="user-name">テストテスト様</span>
        <span class="dropdown-arrow">▾</span>
      </div>
      <div class="user-dropdown" id="userDropdown">
        <a href="profile.html">ユーザー情報</a>
        <a href="password-change.html">パスワードの変更</a>
        <a href="logout.html">ログアウト</a>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="入稿作成_統合.html" class="nav-item">新規注文作成</a>
        <a href="order-list.html" class="nav-item">注文一覧</a>
        <a href="sender-info.html" class="nav-item active">差出人情報</a>
        <a href="template-list.html" class="nav-item">文面パターン</a>
      </nav>
      <div class="plan-info">
        <div class="plan-label">プレミアムプラン<br>(2026/01/15まで)</div>
        <div class="plan-badge">
          <span>残り通数</span>
          <strong>10,000</strong>
        </div>
      </div>
    </aside>

    <main class="content">
      <div class="content-inner">
        <div class="breadcrumb">
          <a href="sender-info.html">差出人情報</a>
          <span>›</span>
          変更
        </div>
        <div class="page-title">差出人情報の変更</div>

        <div class="form-wrap">
          <div class="form-row">
            <label class="form-label" for="company_name">会社名</label>
            <input class="form-input" type="text" id="company_name" name="company_name" value="エクネス株式会社">
          </div>
          <div class="form-row">
            <label class="form-label" for="position">役職</label>
            <input class="form-input" type="text" id="position" name="position" value="代表取締役">
          </div>
          <div class="form-row">
            <label class="form-label" for="name">
              お名前<span class="required">必須</span>
            </label>
            <input class="form-input" type="text" id="name" name="name" value="藤島 伊音">
          </div>
          <div class="form-row">
            <label class="form-label" for="postal_code">
              郵便番号<span class="required">必須</span>
            </label>
            <div class="postal-row">
              <input class="form-input" type="text" id="postal_code" name="postal_code" value="916-0037">
              <button class="btn-search" onclick="alert('住所検索（実装時に接続）')">住所検索</button>
            </div>
          </div>
          <div class="form-row">
            <label class="form-label" for="prefecture">
              都道府県<span class="required">必須</span>
            </label>
            <select class="form-input" id="prefecture" name="prefecture" style="cursor:pointer;">
              <option value="">選択してください</option>
              <option>北海道</option><option>青森県</option><option>岩手県</option><option>宮城県</option>
              <option>秋田県</option><option>山形県</option><option>福島県</option><option>茨城県</option>
              <option>栃木県</option><option>群馬県</option><option>埼玉県</option><option>千葉県</option>
              <option>東京都</option><option>神奈川県</option><option>新潟県</option><option>富山県</option>
              <option>石川県</option><option>福井県</option><option>山梨県</option><option>長野県</option>
              <option>岐阜県</option><option>静岡県</option><option>愛知県</option><option>三重県</option>
              <option>滋賀県</option><option>京都府</option><option>大阪府</option><option>兵庫県</option>
              <option>奈良県</option><option>和歌山県</option><option>鳥取県</option><option>島根県</option>
              <option>岡山県</option><option>広島県</option><option>山口県</option><option>徳島県</option>
              <option>香川県</option><option>愛媛県</option><option>高知県</option><option>福岡県</option>
              <option>佐賀県</option><option>長崎県</option><option>熊本県</option><option>大分県</option>
              <option>宮崎県</option><option>鹿児島県</option><option selected>福井県</option><option>沖縄県</option>
            </select>
          </div>
          <div class="form-row">
            <label class="form-label" for="address">
              市町村・番地<span class="required">必須</span>
            </label>
            <input class="form-input" type="text" id="address" name="address" value="鯖江市上河端町36-4-3">
          </div>
          <div class="form-row">
            <label class="form-label" for="building">建物名など</label>
            <input class="form-input" type="text" id="building" name="building" value="2階">
          </div>

          <div class="form-actions">
            <button class="btn-submit" onclick="location.href='sender-info.html'">変更する</button>
            <a href="sender-info.html" class="back-link">前に戻る</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/common.js"></script>
</body>
</html>
