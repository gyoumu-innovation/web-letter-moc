<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードの変更 | ロボットレターWEB発注システム</title>
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .pw-form { max-width: 400px; }
    .guide-text {
      font-size: 12px;
      color: #777;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .password-wrap {
      position: relative;
    }
    .password-wrap .form-input {
      padding-right: 40px;
      width: 100%;
      box-sizing: border-box;
    }
    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 16px;
      user-select: none;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-logo">
      ロボットレターWEB発注システム
      <span style="font-size:11px; background:#364b72; color:#fff; border-radius:4px; padding:2px 8px; margin-left:10px; font-weight:bold; vertical-align:middle;">管理者用</span>
    </div>
    <div class="header-user">
      <div class="user-trigger" id="userTrigger">
        <div class="user-avatar"></div>
        <span class="user-name">テストテスト様</span>
        <span class="dropdown-arrow">▾</span>
      </div>
      <div class="user-dropdown" id="userDropdown">
        <a href="profile.html">ユーザー情報</a>
        <a href="password-change.html">パスワードの変更</a>
        <a href="../logout.html">ログアウト</a>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="order-list.html"   class="nav-item">受注一覧</a>
        <a href="company-list.html" class="nav-item">企業一覧</a>
        <a href="staff-list.html"   class="nav-item">社内担当者一覧</a>
      </nav>
    </aside>

    <main class="content">
      <div class="content-inner">
        <div class="page-title">パスワードの変更</div>
        <div class="card" style="max-width:520px; margin-top:20px;">
          <div class="pw-form">
            <p class="guide-text">パスワードは半角英字、数字、記号を組み合わせた8文字以上で入力してください。</p>

            <div class="form-group">
              <label class="form-label" for="new_password">新しいパスワード</label>
              <div class="password-wrap">
                <input class="form-input" type="password" id="new_password">
                <span class="toggle-password" onclick="togglePw('new_password')">👁</span>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="confirm_password">確認用</label>
              <div class="password-wrap">
                <input class="form-input" type="password" id="confirm_password">
                <span class="toggle-password" onclick="togglePw('confirm_password')">👁</span>
              </div>
            </div>

            <button class="btn-full" type="button" onclick="alert('パスワードを変更しました。')">変更する</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    function togglePw(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    const ut = document.getElementById('userTrigger');
    const ud = document.getElementById('userDropdown');
    ut.addEventListener('click', e => { e.stopPropagation(); ud.classList.toggle('open'); });
    document.addEventListener('click', () => ud.classList.remove('open'));
  </script>
</body>
</html>
