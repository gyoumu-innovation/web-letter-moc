<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ページが見つかりません | ロボットレターWEB注文システム</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      background: #edeae4;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 52px 44px 44px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 24px rgba(0,0,0,.09);
      text-align: center;
    }
    .logo-area { margin-bottom: 36px; }
    .logo-icon { display: inline-block; margin-bottom: 14px; }
    .logo-title { font-size: 22px; font-weight: bold; color: #1a1a1a; line-height: 1.4; letter-spacing: 0.02em; }
    .error-code {
      font-size: 72px;
      font-weight: bold;
      color: #e0dbd3;
      line-height: 1;
      margin-bottom: 16px;
      letter-spacing: -2px;
    }
    .error-title {
      font-size: 17px;
      font-weight: bold;
      color: #1a1a1a;
      margin-bottom: 12px;
    }
    .error-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.8;
      margin-bottom: 32px;
    }
    .btn-back {
      display: block;
      width: 100%;
      padding: 13px;
      background: #3d6b3d;
      color: #fff;
      border-radius: 30px;
      font-size: 15px;
      font-weight: bold;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-back:hover { opacity: 0.88; }
    .btn-back:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-area">
      <div class="logo-icon">
        <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="36" cy="36" r="36" fill="#2c5438"/>
          <rect x="14" y="30" width="44" height="28" rx="4" fill="#fff" fill-opacity="0.15"/>
          <rect x="14" y="30" width="44" height="28" rx="4" stroke="#fff" stroke-width="1.5" fill="none"/>
          <path d="M14 30 L36 46 L58 30" stroke="#fff" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
          <rect x="26" y="13" width="20" height="18" rx="5" fill="#fff" fill-opacity="0.92"/>
          <rect x="30" y="18" width="4" height="4" rx="1" fill="#2c5438"/>
          <rect x="38" y="18" width="4" height="4" rx="1" fill="#2c5438"/>
          <path d="M31 26 Q36 30 41 26" stroke="#2c5438" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <line x1="36" y1="13" x2="36" y2="9" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="36" cy="8" r="2" fill="#a8d5a2"/>
        </svg>
      </div>
      <div class="logo-title">ロボットレター<br>WEB注文システム</div>
    </div>

    <div class="error-code">404</div>
    <div class="error-title">お探しのページは見つかりませんでした。</div>
    <div class="error-desc">
      アクセスしようとしたページは存在しないか、<br>
      移動・削除された可能性があります。
    </div>
    <a href="index.html" class="btn-back">ログイン画面に戻る</a>
  </div>
</body>
</html>
