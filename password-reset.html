<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードの変更 | ロボットレターWEB注文システム</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      background: #edeae4;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 44px 44px 36px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 24px rgba(0,0,0,.09);
    }
    .logo-area { text-align: center; margin-bottom: 32px; }
    .logo-icon { display: inline-block; margin-bottom: 14px; }
    .logo-title { font-size: 22px; font-weight: bold; color: #1a1a1a; line-height: 1.4; letter-spacing: 0.02em; }
    .page-heading { font-size: 17px; font-weight: bold; color: #1a1a1a; margin-bottom: 24px; }
    .error-msg {
      font-size: 12px; color: #c0392b; background: #fdf0ee;
      border-radius: 4px; padding: 8px 12px; margin-bottom: 16px; display: none;
    }
    .error-msg.show { display: block; }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; }
    .password-wrap { position: relative; }
    .form-input {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 14px; font-family: inherit; outline: none;
      transition: border-color 0.2s; background: #fafaf9;
    }
    .password-wrap .form-input { padding-right: 44px; }
    .form-input:focus { border-color: #4a7a4a; background: #fff; }
    .form-input.is-error { border-color: #c0392b; }
    .toggle-password {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      cursor: pointer; color: #aaa; font-size: 16px; user-select: none; transition: color 0.15s;
    }
    .toggle-password:hover { color: #555; }
    .btn-submit {
      display: block; width: 100%; padding: 13px; border: none; border-radius: 30px;
      font-size: 15px; font-family: inherit; font-weight: bold; cursor: pointer;
      background: #3d6b3d; color: #fff; letter-spacing: 0.04em;
      transition: opacity 0.2s, transform 0.1s; margin-top: 28px;
    }
    .btn-submit:hover { opacity: 0.88; }
    .btn-submit:active { transform: scale(0.98); }
    /* 完了モーダル */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 500;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-card {
      background: #fff; border-radius: 12px;
      padding: 44px 44px 36px; width: 440px; max-width: 95vw;
      box-shadow: 0 8px 32px rgba(0,0,0,.2); text-align: center;
    }
    .modal-check {
      width: 60px; height: 60px; border-radius: 50%; background: #eaf4ea;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .modal-title { font-size: 18px; font-weight: bold; color: #1a1a1a; margin-bottom: 28px; }
    .btn-modal {
      display: block; width: 100%; padding: 13px; border: none; border-radius: 30px;
      font-size: 15px; font-family: inherit; font-weight: bold; cursor: pointer;
      background: #3d6b3d; color: #fff; letter-spacing: 0.04em; text-align: center;
      text-decoration: none; transition: opacity 0.2s;
    }
    .btn-modal:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-area">
      <div class="logo-icon">
        <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="36" cy="36" r="36" fill="#2c5438"/>
          <rect x="14" y="30" width="44" height="28" rx="4" fill="#fff" fill-opacity="0.15"/>
          <rect x="14" y="30" width="44" height="28" rx="4" stroke="#fff" stroke-width="1.5" fill="none"/>
          <path d="M14 30 L36 46 L58 30" stroke="#fff" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
          <rect x="26" y="13" width="20" height="18" rx="5" fill="#fff" fill-opacity="0.92"/>
          <rect x="30" y="18" width="4" height="4" rx="1" fill="#2c5438"/>
          <rect x="38" y="18" width="4" height="4" rx="1" fill="#2c5438"/>
          <path d="M31 26 Q36 30 41 26" stroke="#2c5438" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <line x1="36" y1="13" x2="36" y2="9" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="36" cy="8" r="2" fill="#a8d5a2"/>
        </svg>
      </div>
      <div class="logo-title">ロボットレター<br>WEB注文システム</div>
    </div>

    <div class="page-heading">パスワードの変更</div>

    <div class="error-msg" id="errorMsg">新しいパスワードと一致しません。</div>

    <div class="form-group">
      <label class="form-label" for="new-password">新しいパスワード</label>
      <div class="password-wrap">
        <input class="form-input" type="password" id="new-password" placeholder="8文字以上で入力してください" autocomplete="new-password">
        <span class="toggle-password" data-target="new-password">👁</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="confirm-password">確認用パスワード</label>
      <div class="password-wrap">
        <input class="form-input" type="password" id="confirm-password" placeholder="もう一度入力してください" autocomplete="new-password">
        <span class="toggle-password" data-target="confirm-password">👁</span>
      </div>
    </div>

    <button class="btn-submit" onclick="handleSubmit()">変更する</button>
  </div>

  <!-- 完了モーダル -->
  <div class="modal-overlay" id="completeModal">
    <div class="modal-card">
      <div class="modal-check">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
          <path d="M6 15.5L12 21.5L24 9" stroke="#3d6b3d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="modal-title">変更が完了しました。</div>
      <a href="index.html" class="btn-modal">ログイン画面に戻る</a>
    </div>
  </div>

  <script>
    document.querySelectorAll('.toggle-password').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        input.type = input.type === 'password' ? 'text' : 'password';
      });
    });

    function handleSubmit() {
      const p1 = document.getElementById('new-password').value;
      const p2 = document.getElementById('confirm-password').value;
      const err = document.getElementById('errorMsg');
      const i1 = document.getElementById('new-password');
      const i2 = document.getElementById('confirm-password');

      if (!p1 || !p2 || p1 !== p2) {
        i1.classList.add('is-error');
        i2.classList.add('is-error');
        err.classList.add('show');
        return;
      }
      i1.classList.remove('is-error');
      i2.classList.remove('is-error');
      err.classList.remove('show');
      document.getElementById('completeModal').classList.add('open');
    }
  </script>
</body>
</html>
