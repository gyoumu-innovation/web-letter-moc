<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユーザー情報 | ロボットレターWEB注文システム</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .info-table { width: 100%; border-collapse: collapse; }
    .info-table th {
      width: 140px;
      text-align: left;
      padding: 14px 0;
      font-size: 13px;
      color: #666;
      border-bottom: 1px solid #eee;
      font-weight: normal;
    }
    .info-table td {
      padding: 14px 0;
      font-size: 14px;
      color: #333;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-logo">ロボットレターWEB注文システム</div>
    <div class="header-user">
      <div class="user-trigger" id="userTrigger">
        <div class="user-avatar"></div>
        <span class="user-name">テストテスト様</span>
        <span class="dropdown-arrow">▾</span>
      </div>
      <div class="user-dropdown" id="userDropdown">
        <a href="profile.html">ユーザー情報</a>
        <a href="password-change.html">パスワードの変更</a>
        <a href="logout.html">ログアウト</a>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="入稿作成_統合.html" class="nav-item">新規注文作成</a>
        <a href="order-list.html" class="nav-item">注文一覧</a>
        <a href="sender-info.html" class="nav-item">差出人情報</a>
        <a href="template-list.html" class="nav-item">文面パターン</a>
      </nav>
      <div class="plan-info">
        <div class="plan-label">プレミアムプラン<br>(2026/01/15まで)</div>
        <div class="plan-badge">
          <span>残り通数</span>
          <strong>10,000</strong>
        </div>
      </div>
    </aside>

    <main class="content">
      <div class="content-inner">
        <div class="page-title">ユーザー情報</div>
        <div class="card">
          <table class="info-table">
            <tr>
              <th>会社名</th>
              <td>株式会社テスト</td>
            </tr>
            <tr>
              <th>得意先ID</th>
              <td>C-00001</td>
            </tr>
            <tr>
              <th>メールアドレス</th>
              <td>test@example.com</td>
            </tr>
            <tr>
              <th>電話番号</th>
              <td>03-0000-0000</td>
            </tr>
            <tr>
              <th>担当者名</th>
              <td>テスト テスト</td>
            </tr>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="js/common.js"></script>
</body>
</html>
