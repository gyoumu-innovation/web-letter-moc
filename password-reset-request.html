<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードの再設定 | ロボットレターWEB注文システム</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      background: #edeae4;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 44px 44px 36px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 24px rgba(0,0,0,.09);
    }
    .logo-area { text-align: center; margin-bottom: 32px; }
    .logo-icon { display: inline-block; margin-bottom: 14px; }
    .logo-title { font-size: 22px; font-weight: bold; color: #1a1a1a; line-height: 1.4; letter-spacing: 0.02em; }
    .page-heading { font-size: 17px; font-weight: bold; color: #1a1a1a; margin-bottom: 8px; }
    .page-desc { font-size: 13px; color: #666; margin-bottom: 24px; line-height: 1.8; }
    .error-msg {
      font-size: 12px; color: #c0392b; background: #fdf0ee;
      border-radius: 4px; padding: 8px 12px; margin-bottom: 16px; display: none;
    }
    .error-msg.show { display: block; }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; }
    .form-input {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 14px; font-family: inherit; outline: none;
      transition: border-color 0.2s; background: #fafaf9;
    }
    .form-input:focus { border-color: #4a7a4a; background: #fff; }
    .form-input.is-error { border-color: #c0392b; }
    .btn-submit {
      display: block; width: 100%; padding: 13px; border: none; border-radius: 30px;
      font-size: 15px; font-family: inherit; font-weight: bold; cursor: pointer;
      background: #3d6b3d; color: #fff; letter-spacing: 0.04em;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-submit:hover { opacity: 0.88; }
    .btn-submit:active { transform: scale(0.98); }
    .back-link {
      display: block; text-align: center; margin-top: 18px;
      font-size: 13px; color: #4a7a4a; text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-area">
      <div class="logo-icon">
        <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="36" cy="36" r="36" fill="#2c5438"/>
          <rect x="14" y="30" width="44" height="28" rx="4" fill="#fff" fill-opacity="0.15"/>
          <rect x="14" y="30" width="44" height="28" rx="4" stroke="#fff" stroke-width="1.5" fill="none"/>
          <path d="M14 30 L36 46 L58 30" stroke="#fff" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
          <rect x="26" y="13" width="20" height="18" rx="5" fill="#fff" fill-opacity="0.92"/>
          <rect x="30" y="18" width="4" height="4" rx="1" fill="#2c5438"/>
          <rect x="38" y="18" width="4" height="4" rx="1" fill="#2c5438"/>
          <path d="M31 26 Q36 30 41 26" stroke="#2c5438" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <line x1="36" y1="13" x2="36" y2="9" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="36" cy="8" r="2" fill="#a8d5a2"/>
        </svg>
      </div>
      <div class="logo-title">ロボットレター<br>WEB注文システム</div>
    </div>

    <div class="page-heading">パスワードの再設定</div>
    <div class="page-desc">ご登録のメールアドレスを入力してください。<br>パスワード再設定用のリンクをお送りします。</div>

    <div class="error-msg" id="errorMsg">メールアドレスが正しくありません。</div>

    <div class="form-group">
      <label class="form-label" for="email">メールアドレス</label>
      <input class="form-input" type="email" id="email" placeholder="example@example.com" autocomplete="email">
    </div>

    <button class="btn-submit" onclick="handleSubmit()">パスワードを再設定する</button>
    <a href="index.html" class="back-link">ログインに戻る</a>
  </div>

  <script>
    function handleSubmit() {
      const email = document.getElementById('email').value.trim();
      const input = document.getElementById('email');
      const err = document.getElementById('errorMsg');
      if (!email || !email.includes('@')) {
        input.classList.add('is-error');
        err.classList.add('show');
        return;
      }
      input.classList.remove('is-error');
      err.classList.remove('show');
      location.href = 'password-reset-sent.html';
    }
  </script>
</body>
</html>
