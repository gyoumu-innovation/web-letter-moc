<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メール送信完了 | ロボットレターWEB注文システム</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      background: #edeae4;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 44px 44px 36px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 4px 24px rgba(0,0,0,.09);
    }
    .logo-area { text-align: center; margin-bottom: 32px; }
    .logo-icon { display: inline-block; margin-bottom: 14px; }
    .logo-title { font-size: 22px; font-weight: bold; color: #1a1a1a; line-height: 1.4; letter-spacing: 0.02em; }
    .check-icon {
      width: 52px; height: 52px; border-radius: 50%; background: #eaf4ea;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .page-heading { font-size: 17px; font-weight: bold; color: #1a1a1a; margin-bottom: 12px; text-align: center; }
    .sent-info {
      font-size: 13px; color: #444; line-height: 1.8;
      background: #f5f5f3; border-radius: 6px; padding: 14px 16px;
      margin-bottom: 24px; text-align: center;
    }
    .sent-info strong { color: #1a1a1a; }
    .help-section { margin-bottom: 28px; }
    .help-title { font-size: 13px; font-weight: bold; color: #555; margin-bottom: 10px; }
    .help-list { list-style: none; padding: 0; }
    .help-list li {
      font-size: 13px; color: #666; padding: 6px 0 6px 18px;
      position: relative; line-height: 1.6; border-bottom: 1px solid #f0ede8;
    }
    .help-list li:last-child { border-bottom: none; }
    .help-list li::before {
      content: '•'; position: absolute; left: 4px; color: #3d6b3d;
    }
    .btn-submit {
      display: block; width: 100%; padding: 13px; border: none; border-radius: 30px;
      font-size: 15px; font-family: inherit; font-weight: bold; cursor: pointer;
      background: #3d6b3d; color: #fff; letter-spacing: 0.04em; text-align: center;
      text-decoration: none; transition: opacity 0.2s, transform 0.1s;
    }
    .btn-submit:hover { opacity: 0.88; }
    .btn-submit:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-area">
      <div class="logo-icon">
        <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="36" cy="36" r="36" fill="#2c5438"/>
          <rect x="14" y="30" width="44" height="28" rx="4" fill="#fff" fill-opacity="0.15"/>
          <rect x="14" y="30" width="44" height="28" rx="4" stroke="#fff" stroke-width="1.5" fill="none"/>
          <path d="M14 30 L36 46 L58 30" stroke="#fff" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
          <rect x="26" y="13" width="20" height="18" rx="5" fill="#fff" fill-opacity="0.92"/>
          <rect x="30" y="18" width="4" height="4" rx="1" fill="#2c5438"/>
          <rect x="38" y="18" width="4" height="4" rx="1" fill="#2c5438"/>
          <path d="M31 26 Q36 30 41 26" stroke="#2c5438" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <line x1="36" y1="13" x2="36" y2="9" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="36" cy="8" r="2" fill="#a8d5a2"/>
        </svg>
      </div>
      <div class="logo-title">ロボットレター<br>WEB注文システム</div>
    </div>

    <div class="check-icon">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
        <path d="M5 13.5L10.5 19L21 8" stroke="#3d6b3d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="page-heading">パスワード再設定リンクを<br>送信しました</div>

    <div class="sent-info">
      <strong>i-fujishima@exness.co.jp</strong> に<br>
      <strong>11:03</strong> まで有効なリンクをお送りしました。<br>
      メールボックスをご確認ください。
    </div>

    <div class="help-section">
      <div class="help-title">メールが届いていない場合</div>
      <ul class="help-list">
        <li>迷惑メール（スパム）フォルダをご確認ください</li>
        <li>入力したメールアドレスに誤りがないかご確認ください</li>
        <li>数分待ってから再度お試しください</li>
      </ul>
    </div>

    <a href="index.html" class="btn-submit">ログイン</a>
  </div>
</body>
</html>
