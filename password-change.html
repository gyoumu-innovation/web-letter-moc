<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードの変更 | ロボットレターWEB注文システム</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .pw-form { max-width: 400px; }
    .guide-text {
      font-size: 12px;
      color: #777;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .pw-form .btn-primary {
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-logo">ロボットレターWEB注文システム</div>
    <div class="header-user">
      <div class="user-trigger" id="userTrigger">
        <div class="user-avatar"></div>
        <span class="user-name">テストテスト様</span>
        <span class="dropdown-arrow">▾</span>
      </div>
      <div class="user-dropdown" id="userDropdown">
        <a href="profile.html">ユーザー情報</a>
        <a href="password-change.html">パスワードの変更</a>
        <a href="logout.html">ログアウト</a>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="入稿作成_統合.html" class="nav-item">新規注文作成</a>
        <a href="order-list.html" class="nav-item">注文一覧</a>
        <a href="sender-info.html" class="nav-item">差出人情報</a>
        <a href="template-list.html" class="nav-item">文面パターン</a>
      </nav>
      <div class="plan-info">
        <div class="plan-label">プレミアムプラン<br>(2026/01/15まで)</div>
        <div class="plan-badge">
          <span>残り通数</span>
          <strong>10,000</strong>
        </div>
      </div>
    </aside>

    <main class="content">
      <div class="content-inner">
        <div class="page-title">パスワードの変更</div>
        <div class="card">
          <div class="pw-form">
            <p class="guide-text">パスワードは半角英字、数字、記号を組み合わせた8文字以上で入力してください。</p>

            <div class="form-group">
              <label class="form-label" for="new_password">新しいパスワード</label>
              <div class="password-wrap">
                <input class="form-input" type="password" id="new_password" name="new_password">
                <span class="toggle-password">👁</span>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="confirm_password">確認用</label>
              <div class="password-wrap">
                <input class="form-input" type="password" id="confirm_password" name="confirm_password">
                <span class="toggle-password">👁</span>
              </div>
            </div>

            <button class="btn-primary" type="button">変更する</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/common.js"></script>
</body>
</html>
